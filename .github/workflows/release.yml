name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - arch: x64
            os: ubuntu-24.04
            node_platform: linux-x64
          - arch: arm64
            os: ubuntu-24.04-arm
            node_platform: linux-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript + Vite
        run: pnpm build

      - name: Package runtime node_modules
        run: |
          # Runtime deps (and pinned versions) come from the build's single
          # source of truth: dist/bundles/runtime-deps.json (see build-bundles.mjs).
          mkdir -p _runtime
          node -e '
            const v = require("./dist/bundles/runtime-deps.json");
            const dependencies = Object.fromEntries(
              Object.entries(v).map(([k, val]) => [k, String(val).replace(/[^0-9.]/g, "")]),
            );
            const out = { name: "dm-runtime", version: "1.0.0", dependencies };
            require("fs").writeFileSync("_runtime/package.json", JSON.stringify(out, null, 2) + "\n");
            console.log(JSON.stringify(dependencies));
          '
          pnpm install --prod --no-frozen-lockfile --node-linker=hoisted --dir _runtime

      - name: Download pinned Node binary
        run: |
          # Use same major version as the build environment
          NODE_VER=$(node --version)
          curl -fsSL "https://nodejs.org/dist/${NODE_VER}/node-${NODE_VER}-${{ matrix.node_platform }}.tar.gz" \
            | tar -xz --strip-components=2 -C _runtime -- "node-${NODE_VER}-${{ matrix.node_platform }}/bin/node"
          chmod 0755 _runtime/node

      - name: Build native privacy helper
        run: gcc -O2 -Wall -o dark-matrix-privacy src/native/cros-ec-privacy.c

      - name: Assemble tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          STAGE="dark-matrix"
          mkdir -p "$STAGE/dist/bundles" "$STAGE/dist/deck"

          echo "$VERSION" > "$STAGE/version.txt"
          cp _runtime/node "$STAGE/node"
          cp dark-matrix-privacy "$STAGE/dark-matrix-privacy"
          cp dist/bundles/daemon.js dist/bundles/cli.js "$STAGE/dist/bundles/"
          cp -r dist/deck/web dist/deck/builtins "$STAGE/dist/deck/"
          cp -r _runtime/node_modules "$STAGE/"
          cp -r systemd "$STAGE/"
          cp -r udev "$STAGE/"

          tar -czf "dark-matrix-${VERSION}-linux-${{ matrix.arch }}.tar.gz" "$STAGE"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.arch }}
          path: dark-matrix-*-linux-${{ matrix.arch }}.tar.gz
          retention-days: 1

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: tarball-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dark-matrix-*-linux-*.tar.gz
            scripts/install.sh
          generate_release_notes: true
